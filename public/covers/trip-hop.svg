<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1423"/>
      <stop offset="45%" stop-color="#2d2438"/>
      <stop offset="100%" stop-color="#3d2f1f"/>
    </linearGradient>
    <radialGradient id="haze" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#8b7aa8" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#4a3f5c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1a1423" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warm" cx="78%" cy="82%" r="45%">
      <stop offset="0%" stop-color="#c4a574" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#3d2f1f" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#haze)"/>
  <rect width="512" height="512" fill="url(#warm)"/>
  <circle cx="256" cy="256" r="148" fill="none" stroke="#6b5b7a" stroke-width="2" opacity="0.35"/>
  <circle cx="256" cy="256" r="118" fill="none" stroke="#a89878" stroke-width="1.5" opacity="0.22"/>
  <circle cx="256" cy="256" r="24" fill="#1a1423" stroke="#8b7aa8" stroke-width="2" opacity="0.7"/>
  <rect x="96" y="368" width="112" height="6" rx="3" fill="#8b7aa8" opacity="0.18"/>
  <rect x="320" y="128" width="88" height="5" rx="2.5" fill="#c4a574" opacity="0.16"/>
  <rect width="512" height="512" filter="url(#grain)" opacity="0.55"/>
</svg>
